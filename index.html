<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이수시스템 M&A 인텔리전스</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', Arial, sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }
  header { background: #1a5276; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; }
  header span { font-size: 12px; opacity: .7; }
  .container { max-width: 960px; margin: 0 auto; padding: 20px; }

  /* 검색 & 날짜 선택 */
  .toolbar { background: #fff; border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .toolbar input[type=text] { flex: 1; min-width: 200px; border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px; font-size: 14px; }
  .toolbar input[type=text]:focus { outline: none; border-color: #1a5276; }
  .date-select { border: 1px solid #ddd; border-radius: 6px; padding: 8px 12px; font-size: 14px; background: #fff; color: #333; cursor: pointer; min-width: 150px; }
  .date-select:focus { outline: none; border-color: #1a5276; }

  /* 리포트 본문 */
  .report { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .report-date { color: #888; font-size: 12px; margin-bottom: 16px; }

  .section { margin-bottom: 20px; }
  .section-title { color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
  .news-title { background: #1a5276; }
  .company-title { background: #117a65; }

  .card { background: #f8f9fa; border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; border-left: 4px solid #1a5276; }
  .card.company { border-left-color: #117a65; }
  .card-header { font-weight: bold; color: #1a5276; margin-bottom: 8px; font-size: 14px; }
  .card.company .card-header { color: #117a65; }
  .card-row { display: flex; align-items: flex-start; gap: 8px; margin: 3px 0; font-size: 13px; line-height: 1.5; }
  .card-row span:last-child { word-break: break-word; }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 3px; font-weight: bold; font-size: 11px; white-space: nowrap; min-width: 28px; text-align: center; }
  .badge-s { background: #d5f5e3; color: #1e8449; }
  .badge-w { background: #fde8d8; color: #c0392b; }
  .badge-o { background: #d6eaf8; color: #1a5276; }
  .badge-t { background: #f9ebea; color: #922b21; }
  .badge-key { background: #eee; color: #555; }
  .highlight { background: #fff59d; border-radius: 2px; }

  /* 검색 결과 없음 / 로딩 */
  .empty { text-align: center; padding: 60px; color: #aaa; }
  .loading { text-align: center; padding: 40px; color: #1a5276; }
</style>
</head>
<body>

<header>
  <div>
    <h1>📊 이수시스템 M&amp;A 인텔리전스</h1>
    <span>AI 기반 자동 분석 리포트</span>
  </div>
</header>

<div class="container">
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 키워드 검색 (예: AI, ESG, 인수, 기업명...)" oninput="onSearch()">
    <select class="date-select" id="dateSelect" onchange="selectDate(this.value)"></select>
  </div>
  <div class="report" id="reportArea">
    <div class="loading">리포트를 불러오는 중...</div>
  </div>
</div>

<script>
let allReports = {};
let currentDate = null;
let allDates = [];
let searchQuery = '';
let searchTimer = null;

async function fetchJSON(url) {
  const res = await fetch(url + '?t=' + Date.now());
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function init() {
  try {
    const index = await fetchJSON('reports/index.json');
    if (!index || index.length === 0) {
      document.getElementById('reportArea').innerHTML = '<div class="empty">아직 리포트가 없습니다.<br>GitHub Actions를 실행하면 리포트가 쌓입니다.</div>';
      return;
    }
    allDates = index;
    renderDateButtons(index);
    await loadReport(index[0]);
  } catch (e) {
    document.getElementById('reportArea').innerHTML = '<div class="empty">리포트 데이터를 불러올 수 없습니다.<br>GitHub Pages가 활성화되어 있는지 확인해주세요.</div>';
  }
}

function renderDateButtons(dates) {
  const sel = document.getElementById('dateSelect');
  sel.innerHTML = '';
  for (const dateStr of dates) {
    const opt = document.createElement('option');
    opt.value = dateStr;
    opt.textContent = String(dateStr);
    sel.appendChild(opt);
  }
}

function selectDate(dateStr) {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  loadReport(dateStr);
}

async function loadReport(dateStr) {
  currentDate = dateStr;
  document.getElementById('dateSelect').value = dateStr;

  if (allReports[dateStr]) {
    render(allReports[dateStr]);
    return;
  }

  document.getElementById('reportArea').innerHTML = '<div class="loading">불러오는 중...</div>';
  try {
    const data = await fetchJSON(`reports/${dateStr}.json`);
    allReports[dateStr] = data;
    render(data);
  } catch (e) {
    document.getElementById('reportArea').innerHTML = '<div class="empty">리포트를 불러올 수 없습니다.</div>';
  }
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  clearTimeout(searchTimer);
  if (!searchQuery) {
    // 검색어 없으면 현재 날짜 리포트로 복귀
    document.getElementById('dateSelect').value = currentDate;
    if (currentDate && allReports[currentDate]) render(allReports[currentDate]);
    return;
  }
  searchTimer = setTimeout(() => searchAllDates(), 200);
}

async function searchAllDates() {
  document.getElementById('reportArea').innerHTML = '<div class="loading">전체 리포트 검색 중...</div>';

  // 아직 로드 안 된 날짜 병렬 로드
  const unloaded = allDates.filter(d => !allReports[d]);
  if (unloaded.length > 0) {
    await Promise.all(unloaded.map(async d => {
      try {
        const data = await fetchJSON(`reports/${d}.json`);
        allReports[d] = data;
      } catch (e) { /* 실패한 날짜는 건너뜀 */ }
    }));
  }

  renderSearchAll();
}

function renderSearchAll() {
  const q = searchQuery.toLowerCase();
  const queryHtml = escapeHtml(searchQuery);
  let html = `<div class="report-date">🔍 "${queryHtml}" — 전체 날짜 검색 결과</div>`;
  let totalCount = 0;

  for (const dateStr of allDates) {
    const data = allReports[dateStr];
    if (!data) continue;
    const { news, companies } = parseReport(data.content);

    const matchedNews = news.filter(item =>
      item.header.toLowerCase().includes(q) || item.rows.some(r => r.toLowerCase().includes(q))
    );
    const matchedCompanies = companies.filter(item =>
      item.header.toLowerCase().includes(q) || item.rows.some(r => r.toLowerCase().includes(q))
    );

    if (matchedNews.length === 0 && matchedCompanies.length === 0) continue;
    totalCount += matchedNews.length + matchedCompanies.length;

    const newsCards = matchedNews.map(n => renderCard(n, false)).join('');
    const companyCards = matchedCompanies.map(c => renderCard(c, true)).join('');

    html += `<div style="margin-bottom:24px;">
      <div style="font-size:13px;font-weight:bold;color:#555;margin-bottom:8px;padding:4px 0;border-bottom:1px solid #eee;">📅 ${escapeHtml(dateStr)}</div>
      ${newsCards ? `<div class="section"><div class="section-title news-title">📰 M&A 핵심 뉴스</div>${newsCards}</div>` : ''}
      ${companyCards ? `<div class="section"><div class="section-title company-title">🏢 M&A 유망 기업</div>${companyCards}</div>` : ''}
    </div>`;
  }

  if (totalCount === 0) {
    html += '<div class="empty">전체 리포트에서 검색 결과가 없습니다.</div>';
  } else {
    html = `<div class="report-date">🔍 "${queryHtml}" — 총 ${totalCount}건 (${allDates.length}개 날짜 검색)</div>` + html.slice(html.indexOf('<div style='));
  }

  document.getElementById('reportArea').innerHTML = html;
}

function escapeHtml(text) {
  return String(text ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(text) {
  return escapeHtml(text);
}

function safeUrl(url) {
  const value = String(url ?? '').trim();
  if (!value) return '';
  try {
    const parsed = new URL(value, window.location.origin);
    if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
      return parsed.href;
    }
  } catch (e) {
    return '';
  }
  return '';
}

function highlight(text) {
  if (!searchQuery) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const q = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(q, 'gi'), m => `<span class="highlight">${m}</span>`);
}

function parseReport(content) {
  const lines = content.split('\n').map(l => l.trim()).filter(l => l);
  const news = [], companies = [];
  let current = null;
  let mode = null;
  // Skip lines that are markdown noise
  const skipPattern = /^(---+|#{1,3}\s+(수정된|크롤링|파트1|파트2|\[파트)|#{1,3}\s+M&A 유망|#{1,3}\s+주요 뉴스|#{1,3}\s+뉴스 분석|#{1,3}\s+선별 뉴스|\|.*\||\*\*주요 수정|#{1,3}\s+M&A 인텔|> ⚠️)/;

  for (const line of lines) {
    // Normalize: strip leading markdown (## , **, - , > )
    const norm = line.replace(/^#{1,3}\s+/, '').replace(/^\*\*\s*/, '').replace(/\*\*\s*$/, '').replace(/^-\s+/, '').replace(/^>\s+/, '').trim();

    if (norm.startsWith('[뉴스')) {
      if (current) (mode === 'news' ? news : companies).push(current);
      current = { header: norm.replace(/^\[뉴스\d+\]\s*/, ''), rows: [] };
      mode = 'news';
    } else if (norm.startsWith('[기업')) {
      if (current) (mode === 'news' ? news : companies).push(current);
      current = { header: norm.replace(/^\[기업\d+\]\s*/, ''), rows: [] };
      mode = 'company';
    } else if (line === '=== END ===' || line === '===END===') {
      if (current) (mode === 'news' ? news : companies).push(current);
      current = null;
    } else if (current) {
      // Skip markdown noise lines inside items
      if (skipPattern.test(line) || line === '---') continue;
      // Strip markdown formatting from row: "- **S:** val" → "S: val"
      let row = line.replace(/^-\s+/, '').replace(/\*\*/g, '').replace(/^>\s+/, '').trim();
      // Skip empty after stripping, or lines that are just section headers
      if (!row || /^#{1,3}\s/.test(row)) continue;
      // Normalize ~~strikethrough~~ → remove
      row = row.replace(/~~/g, '');
      if (row) current.rows.push(row);
    }
  }
  if (current) (mode === 'news' ? news : companies).push(current);
  return { news, companies };
}

function renderCard(item, isCompany) {
  const cls = isCompany ? 'card company' : 'card';
  let linkUrl = '';
  const rows = item.rows.map(row => {
    const colonIdx = row.indexOf(':');
    if (colonIdx === -1) return `<div class="card-row">${highlight(row)}</div>`;
    const key = row.slice(0, colonIdx).trim().replace(/\*\*/g, '');
    const val = row.slice(colonIdx + 1).trim().replace(/^\*\*\s*/, '').replace(/\*\*\s*$/, '');
    if (key === 'URL' || key === '홈페이지') {
      linkUrl = safeUrl(val);
      const label = isCompany ? '🔗 홈페이지' : '🔗 기사 원문';
      if (!linkUrl) {
        return `<div class="card-row"><span style="color:#999;font-size:12px;">${label} 확인 필요</span></div>`;
      }
      return `<div class="card-row"><a href="${escapeAttr(linkUrl)}" target="_blank" rel="noopener noreferrer" style="color:#1a5276;font-size:12px;">${label} →</a></div>`;
    }
    if (key === 'S') return `<div class="card-row"><span class="badge badge-s">S</span><span title="${escapeAttr(val)}">${highlight(val)}</span></div>`;
    if (key === 'W') return `<div class="card-row"><span class="badge badge-w">W</span><span title="${escapeAttr(val)}">${highlight(val)}</span></div>`;
    if (key === 'O') return `<div class="card-row"><span class="badge badge-o">O</span><span title="${escapeAttr(val)}">${highlight(val)}</span></div>`;
    if (key === 'T') return `<div class="card-row"><span class="badge badge-t">T</span><span title="${escapeAttr(val)}">${highlight(val)}</span></div>`;
    if (val) return `<div class="card-row"><span class="badge badge-key">${highlight(key)}</span><span title="${escapeAttr(val)}">${highlight(val)}</span></div>`;
    return `<div class="card-row">${highlight(row)}</div>`;
  }).join('');

  const headerMatches = !searchQuery || item.header.toLowerCase().includes(searchQuery.toLowerCase()) ||
    item.rows.some(r => r.toLowerCase().includes(searchQuery.toLowerCase()));
  if (!headerMatches) return '';

  const headerHtml = linkUrl
    ? `<a href="${escapeAttr(linkUrl)}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none;">${isCompany ? '🏢' : '📌'} ${highlight(item.header)}</a>`
    : `${isCompany ? '🏢' : '📌'} ${highlight(item.header)}`;

  return `<div class="${cls}"><div class="card-header">${headerHtml}</div>${rows}</div>`;
}

function render(data) {
  const { news, companies } = parseReport(data.content);
  const newsCards = news.map(n => renderCard(n, false)).join('');
  const companyCards = companies.map(c => renderCard(c, true)).join('');
  const reportDate = escapeHtml(data.date);
  const newsCount = escapeHtml(data.news_count);

  const hasResults = newsCards + companyCards;
  document.getElementById('reportArea').innerHTML = `
    <div class="report-date">📅 ${reportDate} | 수집 뉴스 ${newsCount}건 분석</div>
    ${!hasResults && searchQuery ? '<div class="empty">검색 결과가 없습니다.</div>' : ''}
    ${newsCards ? `<div class="section"><div class="section-title news-title">📰 M&A 핵심 뉴스 TOP 3</div>${newsCards}</div>` : ''}
    ${companyCards ? `<div class="section"><div class="section-title company-title">🏢 M&A 유망 기업 추천 (시총 1,000억 이하)</div>${companyCards}</div>` : ''}
  `;
}

init();
</script>
</body>
</html>
