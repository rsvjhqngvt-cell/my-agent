name: 이수시스템 M&A 인텔리전스 리포트

on:
  schedule:
    - cron: '0 23 * * 0-4'  # 한국시간 월-금 오전 8시 (UTC 23:00 전날)
  workflow_dispatch:

permissions:
  contents: write  # 리포트 파일을 repo에 푸시하기 위해 필요

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 에이전트 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VIEWER_URL: ${{ secrets.VIEWER_URL }}
        run: python agent.py

      - name: 리포트 파일 저장 (GitHub 푸시)
        run: |
          git config user.name "ISU Agent"
          git config user.email "agent@github.com"
          git add reports/
          git diff --staged --quiet && echo "저장할 변경사항 없음" && exit 0
          git commit -m "📊 리포트: $(date +%Y-%m-%d)"
          git push origin main || (git fetch origin main && git rebase FETCH_HEAD && git push origin main)
